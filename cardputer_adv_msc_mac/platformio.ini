; ╔══════════════════════════════════════════════════════════════════════╗
; ║   CardPuter ADV — PlatformIO config                                  ║
; ╚══════════════════════════════════════════════════════════════════════╝

[env:cardputer_adv]
platform             = espressif32
board                = esp32-s3-devkitc-1
framework            = arduino

; ── Flash / particiones ──────────────────────────────────────────────────────
; El Stamp-S3A tiene 8MB de flash
board_build.flash_size     = 8MB
board_build.partitions     = default_8MB.csv
board_upload.flash_size    = 8MB

; ── Flags CRÍTICOS para USB MSC + macOS ──────────────────────────────────────
; ARDUINO_USB_MODE=0  → activa el modo OTG/TinyUSB (no HWCDC)
;                        Sin esto el dispositivo aparece como CDC y macOS
;                        no lo reconoce como almacenamiento.
; ARDUINO_USB_CDC_ON_BOOT=0 → no exponer puerto serie por defecto
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

; ── Dependencias ─────────────────────────────────────────────────────────────
; SdFat de Bill Greiman — más estable para acceso por sectores directos
lib_deps =
    greiman/SdFat@^2.2.3

; ── Velocidad de subida ───────────────────────────────────────────────────────
upload_speed = 921600
